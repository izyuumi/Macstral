name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax (voxtral_server.py)
        run: python -m py_compile Macstral/Resources/voxtral_server.py && echo "✅ voxtral_server.py syntax OK"

      - name: Build (unsigned)
        run: |
          xcodebuild build \
            -project Macstral.xcodeproj \
            -scheme Macstral \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Test
        run: |
          xcodebuild test \
            -project Macstral.xcodeproj \
            -scheme Macstral \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
